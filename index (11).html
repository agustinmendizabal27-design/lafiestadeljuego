<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0D0020; }

  .landing {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .bg-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 340px;
    background: linear-gradient(to top, rgba(10,0,30,0.98) 0%, rgba(10,0,30,0.85) 40%, rgba(10,0,30,0.4) 75%, transparent 100%);
  }

  .bottom-section {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 0 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* BONO BANNER */
  .bono-banner {
    background: linear-gradient(135deg, #FFD700 0%, #FF8C00 50%, #FFD700 100%);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 0 30px rgba(255,180,0,0.6), 0 0 60px rgba(255,140,0,0.3);
    animation: bonoPulse 2.5s ease-in-out infinite;
    position: relative;
    overflow: hidden;
  }
  .bono-banner::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: bonoShimmer 2.5s ease-in-out infinite;
  }
  @keyframes bonoShimmer {
    0% { left: -60%; }
    60%, 100% { left: 110%; }
  }
  @keyframes bonoPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,180,0,0.6), 0 0 60px rgba(255,140,0,0.3); }
    50% { box-shadow: 0 0 45px rgba(255,200,0,0.9), 0 0 80px rgba(255,140,0,0.5); }
  }
  .bono-icon { font-size: 32px; flex-shrink: 0; }
  .bono-text { flex: 1; }
  .bono-titulo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #1a0a00;
    letter-spacing: 2px;
    line-height: 1;
  }
  .bono-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: rgba(30,10,0,0.8);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .bono-badge {
    background: #1a0040;
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    flex-shrink: 0;
    border: 1px solid #FFD700;
  }
  .bono-badge-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #FFD700;
    line-height: 1;
    letter-spacing: 1px;
  }
  .bono-badge-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,215,0,0.8);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* BENEFICIOS */
  .beneficios {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .beneficio-item {
    flex: 1;
    background: rgba(109,0,204,0.25);
    border: 1px solid rgba(180,80,255,0.35);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
  }
  .beneficio-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .beneficio-texto {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  /* BOTÓN WA */
  .wa-btn {
    width: 100%;
    padding: 18px 20px;
    border-radius: 16px;
    border: 3px solid #00FF66;
    background: linear-gradient(135deg, #1DB954, #25D366, #128C7E);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    box-shadow:
      0 0 40px rgba(37,211,102,0.7),
      0 0 80px rgba(37,211,102,0.3),
      0 4px 20px rgba(0,0,0,0.6);
    animation: waPulse 2s ease-in-out infinite;
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }
  .wa-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: waShimmer 2s ease-in-out infinite;
  }
  @keyframes waShimmer {
    0% { left: -100%; }
    50%,100% { left: 100%; }
  }
  .wa-btn:active { transform: scale(0.97); }
  @keyframes waPulse {
    0%,100% {
      box-shadow: 0 0 40px rgba(37,211,102,0.7), 0 0 80px rgba(37,211,102,0.3), 0 4px 20px rgba(0,0,0,0.6);
    }
    50% {
      box-shadow: 0 0 60px rgba(37,211,102,1), 0 0 100px rgba(37,211,102,0.5), 0 0 0 8px rgba(37,211,102,0.2);
    }
  }
  .wa-btn-top {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .wa-btn-top svg { width: 32px; height: 32px; fill: #fff; flex-shrink: 0; }
  .wa-btn-sub {
    color: rgba(255,255,255,0.92);
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
</style>

<body>
<div class="landing">
  <img class="bg-img" src="bg.jpg" alt="La Fiesta del Juego" />
  <div class="bg-overlay"></div>

  <div class="bottom-section">

    <!-- BONO -->
    <div class="bono-banner">
      <div class="bono-icon">🎁</div>
      <div class="bono-text">
        <div class="bono-titulo">Bono de bienvenida</div>
        <div class="bono-sub">Solo para nuevos jugadores · Tiempo limitado</div>
      </div>
      <div class="bono-badge">
        <div class="bono-badge-num">100%</div>
        <div class="bono-badge-label">en tu 1er depósito</div>
      </div>
    </div>

    <!-- BENEFICIOS -->
    <div class="beneficios">
      <div class="beneficio-item">
        <span class="beneficio-icon">⚡</span>
        <span class="beneficio-texto">Retiros rápidos</span>
      </div>
      <div class="beneficio-item">
        <span class="beneficio-icon">🔒</span>
        <span class="beneficio-texto">100% seguro</span>
      </div>
      <div class="beneficio-item">
        <span class="beneficio-icon">🏆</span>
        <span class="beneficio-texto">Premios reales</span>
      </div>
      <div class="beneficio-item">
        <span class="beneficio-icon">🎰</span>
        <span class="beneficio-texto">Slots y más</span>
      </div>
    </div>

    <!-- BOTÓN WA -->
    <button class="wa-btn" onclick="abrirWA()">
      <div class="wa-btn-top">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        HABLAR POR WHATSAPP
      </div>
      <div class="wa-btn-sub">Tocá acá y reclamá tu bono</div>
    </button>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBKzhnR8Sn8mvC_55dAgsp7og6aFu4wWbs",
    authDomain: "la-fiesta-del-juego.firebaseapp.com",
    projectId: "la-fiesta-del-juego",
    storageBucket: "la-fiesta-del-juego.firebasestorage.app",
    messagingSenderId: "275954980431",
    appId: "1:275954980431:web:2f624695591c87e3317c3a"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);
  const waMensaje = encodeURIComponent("¡Hola! Quiero unirme a La Fiesta del Juego 🎰🎉 y reclamar mi bono de bienvenida");
  let waNumeros = [];
  let waIndex = parseInt(localStorage.getItem('fdj_wa_idx') || '0');

  onSnapshot(doc(db, 'config', 'whatsapp'), (snap) => {
    if (snap.exists()) waNumeros = snap.data().numeros || [];
  });

  window._waMensaje = waMensaje;
  window._getWaNumeros = () => waNumeros;
  window._getWaIndex = () => waIndex;
  window._setWaIndex = (v) => { waIndex = v; };
</script>

<script>
  window.abrirWA = function() {
    const waNumeros = window._getWaNumeros ? window._getWaNumeros() : [];
    let waIndex = window._getWaIndex ? window._getWaIndex() : 0;
    const waMensaje = window._waMensaje || encodeURIComponent("¡Hola! Quiero unirme a La Fiesta del Juego 🎰");
    const activos = waNumeros.filter(n => n.estado === 'activo');
    if (!activos.length) { alert("No hay líneas disponibles. Intentá en unos minutos."); return; }
    const entry = activos[waIndex % activos.length];
    if (typeof fbq !== 'undefined') fbq('track', 'Lead');
    window.open("https://wa.me/" + entry.numero + "?text=" + waMensaje, '_blank');
    waIndex++;
    if (window._setWaIndex) window._setWaIndex(waIndex);
    localStorage.setItem('fdj_wa_idx', waIndex);
    const t = Date.now();
    const check = setInterval(() => {
      if (document.visibilityState === 'visible' && Date.now() - t > 1500 && Date.now() - t < 5000) {
        clearInterval(check);
        waIndex++;
        if (window._setWaIndex) window._setWaIndex(waIndex);
        localStorage.setItem('fdj_wa_idx', waIndex);
        window.abrirWA();
      }
      if (Date.now() - t > 6000) clearInterval(check);
    }, 500);
  };
</script>
